<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"content="width=device-width, initail-scale=1.0">
    <title>Kalkolator Mudah</title>
    <style>
      *{
          margin:0;
          padding:0;
          box-sizing: border-box;
      }

      body{
          font-family:'Segeo UI', Tahoma,Geneva,Verdana,sans-serif;
          display:flex;
          justify-content: center;
          align-items: 100vh;
          background: linear-gradient(135deg, #667eea0%, #764ba2 100%);
      }

      .container{
          text-align: center;
      }

      h1{
          color:white;
          margin-bottom: 20px;
          font-size: 2.5em;
          text-shadow:2px 2px 4px rgba(0,0,0,0.3);
      }

      .calculator{
          background:white;
          padding: 20px;
          border-radius: 15px;
          box-shadow:0 10px 30px rgba(0,0,0,0.3);
          width: 320px;
      }

      #display{
          width: 100%;
          padding: 15px;
          font-size: 2em;
          border: 2px solid #ddd;
          border-radius: 10px;
          margin-bottom: 20px;
          text-align: right;
          background: #f0f0f0;
      }

      .butons{
          display: grid;
          grid-template-columns: repeat(4,1fr);
          gap: 10px;
      }

      .btn{
          padding: 20px;
          font-size: 1.2em;
          border: none;
          border-radius: 8px;
          cursor: poiner;
          background: #e0e0e0;
          color: #333;
          font-weight: bold;
          transition: all 0.2s;
      }

      .btn:hover{
          background: #d0d0d0;
          transform: scale(1.05);
      }

      .btn:active{
          transform: scale(0.95);
      }

      .btn.operator{
          background: #667eea;
          color:white;
      }
    </style>
  </head>
</html>
